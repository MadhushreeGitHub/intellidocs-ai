version: '3.9'

services:

  # ── PostgreSQL with pgvector extension ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: intellidocs-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-intellidocs}
      POSTGRES_USER: ${POSTGRES_USER:-intellidocs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-intellidocs_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-intellidocs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intellidocs-network

  # ── Redis for caching, rate limiting, session ──────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: intellidocs-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - intellidocs-network

  # ── RabbitMQ for async document ingestion pipeline ─────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: intellidocs-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-intellidocs}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rabbitmq_pass}
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI - open localhost:15672 to monitor queues
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - intellidocs-network

  # ── Prometheus for metrics scraping ───────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: intellidocs-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - intellidocs-network

  # ── Spring Boot application ────────────────────────────────────────
  # Uncomment this after Dockerfile is ready (Phase 5)
  # app:
  #   build: .
  #   container_name: intellidocs-app
  #   env_file: .env
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     rabbitmq:
  #       condition: service_healthy
  #   networks:
  #     - intellidocs-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:

networks:
  intellidocs-network:
    driver: bridge
